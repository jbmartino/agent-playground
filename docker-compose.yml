# Docker Compose configuration for local development.
#
# Usage:
#   docker compose up        — start the app
#   docker compose up --build — rebuild after Gemfile or Dockerfile changes
#   docker compose down      — stop and remove containers

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: mar8
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mar8"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - DB_HOST=db
      - POSTGRES_USER=mar8
      - POSTGRES_PASSWORD=password
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  postgres_data:
